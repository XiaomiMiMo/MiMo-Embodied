# Copyright 2025 Xiaomi Corporation.

dataset_path: nyu-visionx/cv-bench
task: "cvbench_boxed"
test_split: test
dataset_kwargs:
  token: True

output_type: generate_until
doc_to_visual: !function utils.cvbench_doc_to_visual
doc_to_text: !function utils.cvbench_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0.0
  top_p: 1.0 
  num_beams: 1
  do_sample: false
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nPut your final answer in \\boxed{}."
filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils.BoxedFilter

process_results: !function utils.cvbench_process_results
metric_list:
  - metric: accuracy   
    aggregation: !function utils.cvbench_aggregate_results
    higher_is_better: true
metadata:
  - version: 0.0
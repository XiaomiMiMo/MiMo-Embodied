# Copyright 2025 Xiaomi Corporation.

dataset_path: Zray26/nuscenesqa
task: nuscenesqa
test_split: test
dataset_kwargs:
  token: True

img_root: "/path/to/your/image_or_video_data"
output_type: generate_until
doc_to_visual: !function utils.doc_to_visual
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
process_results: !function utils.process_test_results_for_submission_nuscenesqa  

lmms_eval_specific_kwargs:
  default:
    prompt_format: qa
    pre_prompt: "1: <image> 2: <image> 3: <image> 4: <image> 5: <image> 6: <image>. These six images are the front view, front left view, front right view, back view, back left view and back right view of the ego vehicle. "
    post_prompt: ""

model_specific_target_kwargs:
  default: "mcq"

generation_kwargs:
  max_new_tokens: 3072 
  temperature: 0
  do_sample: False

filter_list:
  - name: "extract"
    filter:
      - function: !function utils.AnswerFilter

metric_list:
  - metric: accuracy
    aggregation: !function utils.nuscenesqa_aggregate_results
    higher_is_better: true 

metadata:
  - version: 0.0




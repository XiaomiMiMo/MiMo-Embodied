dataset_path: Zray26/roboafford-eval
task: roboafford
test_split: test  
dataset_kwargs:
  token: True

output_type: generate_until
doc_to_visual: !function utils.roboafford_doc_to_visual
doc_to_text: !function utils.roboafford_doc_to_text_mimo
doc_to_target: "mask"
generation_kwargs:
  max_new_tokens: 32768
  do_sample: false
  temperature: 0.0

process_results: !function utils.roboafford_process_results
metric_list:
  - metric: accuracy   
    aggregation: !function utils.roboafford_aggregate_results
    higher_is_better: true
metadata:
  - version: 0.0

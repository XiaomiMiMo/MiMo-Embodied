# Copyright 2025 Xiaomi Corporation.

dataset_path: qiulu66/ego_plan-bench2
task: egoplan
test_split: train
dataset_kwargs:
  token: true

img_root: "/path/to/your/image_or_video_data"
output_type: generate_until
doc_to_visual: !function utils.doc_to_visual_video
doc_to_text: !function utils.doc_to_text
doc_to_target: golden_choice_idx
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.process_results
metric_list:
  - metric: accuracy
    aggregation: !function utils.aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nPut your final answer in \\boxed{}."
filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils.BoxedFilter
metadata:
  version: 0.0

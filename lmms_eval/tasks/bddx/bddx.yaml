dataset_path: Zray26/bdd_x_testing_caption
task: "bddx"
test_split: test
dataset_kwargs:
  token: True

output_type: generate_until
img_root: "/path/to/your/image_or_video_data"
doc_to_visual: !function utils.doc_to_visual
doc_to_text: !function utils.doc_to_text
doc_to_target: !function utils.doc_to_target
process_results: !function utils.process_test_results_for_submission  

lmms_eval_specific_kwargs:
  default:
    prompt_format: qa
    pre_prompt: ""
    post_prompt: ""

model_specific_target_kwargs:
  default: "mcq"

generation_kwargs:
  max_new_tokens: 32768
  temperature: 0
  do_sample: False

filter_list:
  - name: "extract"
    filter:
      - function: !function utils.AnswerFilter

metric_list:
  - metric: caption
    aggregation: !function utils.bddx_caption
    higher_is_better: true


metadata:
  - version: 0.0
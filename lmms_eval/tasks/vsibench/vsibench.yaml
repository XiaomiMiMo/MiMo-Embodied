# Copyright 2025 Xiaomi Corporation.

dataset_path: nyu-visionx/VSI-Bench
dataset_kwargs:
  token: True
  cache_dir: vsibench
  load_from_disk: true
  video: True
task: vsibench
test_split: test
output_type: generate_until
doc_to_visual: !function utils.vsibench_doc_to_visual
doc_to_text: !function utils.vsibench_doc_to_text
doc_to_target: "ground_truth"
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.vsibench_process_results
metric_list:
  - metric: vsibench_score
    aggregation: !function utils.vsibench_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    mca_post_prompt: "\nAnswer with the option's letter from the given choices directly."
    na_post_prompt: "\nPlease answer the question using a single word or phrase."
metadata:
  - version: 0.0
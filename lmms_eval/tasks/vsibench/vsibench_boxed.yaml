# Copyright 2025 Xiaomi Corporation.

dataset_path: nyu-visionx/vsi-bench
task: vsibench_boxed
test_split: test
dataset_kwargs:
  token: True

img_root: "/path/to/your/image_or_video_data"
output_type: generate_until
doc_to_visual: !function utils.vsibench_doc_to_visual
doc_to_text: !function utils.vsibench_doc_to_text
doc_to_target: "ground_truth"
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
# The return value of process_results will be used by metrics
process_results: !function utils.vsibench_process_results_boxed
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: vsibench_score
    aggregation: !function utils.vsibench_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    mca_post_prompt: "\nAnswer with the option's letter from the given choices. Put your final answer in \\boxed{}."
    na_post_prompt: "\nPlease answer the question using a single word or phrase. Put your final answer in \\boxed{}."
metadata:
  - version: 0.0